name: Build x86-32 ImmortalWrt
run-name: ${{ inputs.device }}

on:
  workflow_dispatch:
    inputs:
      device:
        description: '请输入设备型号,比如: ax6s wr30u-stock x86_64_DEVICE_generic'
        required: true
        default: 'x86_generic_DEVICE_generic'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      run: |
        sudo apt update
        sudo apt -y install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget

    - name: Clone source code
      run: |
        git clone -b v24.10.5 --single-branch --filter=blob:none https://github.com/immortalwrt/immortalwrt.git immortalwrt && cp -r files immortalwrt && chmod 755 -R immortalwrt/files && cat feeds.buildinfo >>immortalwrt/feeds.conf.default
        cat immortalwrt/feeds.conf.default

    - name: Update feeds
      run: cd immortalwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd immortalwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cp .config ./immortalwrt/.config
        cp config-6.6 ./immortalwrt/target/linux/x86/config-6.6
        

    - name: Compile ${{ env.DEVICE_NAME }} firmware
      run: cd immortalwrt && make -j$(nproc) defconfig download clean world

    - name: Setup Debug Session
      #uses: csexton/debugger-action@master
      run: echo "aaaaaaaaaaaaa"

    - name: build kenel
      run: cd immortalwrt
      
    - name: Upload firmware to workflow directory
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.DEVICE_NAME }}-squashfs
        path: immortalwrt/bin/targets/*/*/*squashfs*
        
